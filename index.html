<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="hero">
        <span class="eyebrow">Chrome / Orange Pi</span>
        <h1>Media Harvest</h1>
        <p>Baixe o video aberto ou use o botao que aparece no player.</p>
      </section>

      <section class="card">
        <label for="backendUrlInput">Servidor</label>
        <input
          type="text"
          class="pathInput"
          id="backendUrlInput"
          placeholder="http://IP_DO_ORANGE_PI:3000"
        />
        <button id="backendUrlButton">Confirmar servidor</button>
      </section>

      <section class="card">
        <label for="folderPathInput">Pasta de destino</label>
      <input
        type="text"
        class="pathInput"
        id="folderPathInput"
          placeholder="Opcional no Docker: /downloads"
      />
        <div class="button-row">
          <button id="submitButton">Salvar</button>
          <button id="deletePath">Limpar</button>
        </div>
        <button id="openFolder">Abrir pasta</button>
      </section>

      <section class="card">
        <h2>Formato</h2>
        <button class="downloadButton primary" id="original">
          <span>Original</span>
          <small>Melhor qualidade disponivel</small>
        </button>
        <button class="downloadButton" id="whatsapp">
          <span>WhatsApp</span>
          <small>MP4 menor que 20 MB quando possivel</small>
        </button>
        <button class="downloadButton" id="mp3">
          <span>MP3</span>
          <small>Somente audio</small>
        </button>
      </section>

      <div id="alert" class="alert">
        <p id="status"></p>
      </div>
    </main>
    <script src="main.js"></script>
  </body>
</html>
